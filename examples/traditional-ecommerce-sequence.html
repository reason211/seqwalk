<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Traditional E-commerce Sequence Diagram</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      --bg: #f7f8fb;
      --ink: #172033;
      --muted: #667085;
      --line: #c7cfda;
      --blue: #2f7df6;
      --green: #16a36f;
      --orange: #df8f32;
      --red: #d95f5f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 1180px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    .page {
      width: 1180px;
      margin: 0 auto;
      padding: 32px 28px 42px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      padding: 7px 10px;
      border: 1px solid #d8dee8;
      border-radius: 999px;
      color: #9a3412;
      background: #fff7ed;
      font-size: 12px;
    }

    svg {
      width: 100%;
      height: 760px;
      border: 1px solid #d9e0ea;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 18px 46px rgba(20, 32, 51, 0.09);
    }

    .actor {
      fill: #fff;
      stroke: #ccd5e1;
      stroke-width: 1;
    }

    .actor-text {
      fill: #1f2a44;
      font-size: 12px;
      font-weight: 700;
      text-anchor: middle;
    }

    .actor-sub {
      fill: #697386;
      font-size: 10px;
      text-anchor: middle;
    }

    .lifeline {
      stroke: #c8d1dd;
      stroke-width: 1.2;
      stroke-dasharray: 7 7;
    }

    .msg {
      stroke-width: 2.4;
      marker-end: url(#arrow);
      fill: none;
    }

    .return {
      stroke-dasharray: 6 5;
    }

    .label {
      fill: #39465c;
      font-size: 10px;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 4px;
      stroke-linejoin: round;
      text-anchor: middle;
    }

    .noise path {
      fill: none;
      stroke-width: 1.4;
      stroke-dasharray: 3 4;
      opacity: 0.48;
      marker-end: url(#arrow);
    }

    .noise text {
      fill: #667085;
      font-size: 9px;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 3px;
      stroke-linejoin: round;
      text-anchor: middle;
    }

    .dense-note {
      fill: #b42318;
      font-size: 11px;
      font-weight: 700;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .phase {
      fill: #eef4ff;
      stroke: #d8e6ff;
      stroke-width: 1;
    }

    .phase-text {
      fill: #245fc2;
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>Traditional Sequence Diagram: E-commerce Order To Delivery</h1>
        <p>A dense static view of the same flow: callbacks, retries, audits, notifications, and BI events all appear at once.</p>
      </div>
      <span class="badge">static, all signals visible</span>
    </header>

    <svg viewBox="0 0 1124 760" role="img" aria-label="Traditional e-commerce sequence diagram">
      <defs>
        <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L9,4.5 L0,9 z" fill="#516174" />
        </marker>
      </defs>

      <rect class="phase" x="24" y="106" width="1076" height="108" rx="12" />
      <text class="phase-text" x="42" y="130">A Checkout and stock hold</text>
      <rect class="phase" x="24" y="228" width="1076" height="136" rx="12" />
      <text class="phase-text" x="42" y="252">B Payment and confirmation</text>
      <rect class="phase" x="24" y="378" width="1076" height="136" rx="12" />
      <text class="phase-text" x="42" y="402">C Warehouse fulfillment</text>
      <rect class="phase" x="24" y="528" width="1076" height="150" rx="12" />
      <text class="phase-text" x="42" y="552">D Delivery and sign-off</text>

      <g>
        <rect class="actor" x="28" y="24" width="100" height="56" rx="12" />
        <text class="actor-text" x="78" y="48">Shopper</text>
        <text class="actor-sub" x="78" y="65">web / mobile</text>
        <line class="lifeline" x1="78" y1="80" x2="78" y2="710" />

        <rect class="actor" x="151" y="24" width="100" height="56" rx="12" />
        <text class="actor-text" x="201" y="48">Storefront</text>
        <text class="actor-sub" x="201" y="65">checkout UI</text>
        <line class="lifeline" x1="201" y1="80" x2="201" y2="710" />

        <rect class="actor" x="274" y="24" width="100" height="56" rx="12" />
        <text class="actor-text" x="324" y="48">Order</text>
        <text class="actor-sub" x="324" y="65">state machine</text>
        <line class="lifeline" x1="324" y1="80" x2="324" y2="710" />

        <rect class="actor" x="397" y="24" width="100" height="56" rx="12" />
        <text class="actor-text" x="447" y="48">Inventory</text>
        <text class="actor-sub" x="447" y="65">stock hold</text>
        <line class="lifeline" x1="447" y1="80" x2="447" y2="710" />

        <rect class="actor" x="520" y="24" width="100" height="56" rx="12" />
        <text class="actor-text" x="570" y="48">Payment</text>
        <text class="actor-sub" x="570" y="65">gateway</text>
        <line class="lifeline" x1="570" y1="80" x2="570" y2="710" />

        <rect class="actor" x="643" y="24" width="100" height="56" rx="12" />
        <text class="actor-text" x="693" y="48">Ledger</text>
        <text class="actor-sub" x="693" y="65">database</text>
        <line class="lifeline" x1="693" y1="80" x2="693" y2="710" />

        <rect class="actor" x="766" y="24" width="100" height="56" rx="12" />
        <text class="actor-text" x="816" y="48">Warehouse</text>
        <text class="actor-sub" x="816" y="65">pick pack</text>
        <line class="lifeline" x1="816" y1="80" x2="816" y2="710" />

        <rect class="actor" x="889" y="24" width="100" height="56" rx="12" />
        <text class="actor-text" x="939" y="48">Courier</text>
        <text class="actor-sub" x="939" y="65">delivery</text>
        <line class="lifeline" x1="939" y1="80" x2="939" y2="710" />

        <rect class="actor" x="1012" y="24" width="100" height="56" rx="12" />
        <text class="actor-text" x="1062" y="48">Notify</text>
        <text class="actor-sub" x="1062" y="65">email / push</text>
        <line class="lifeline" x1="1062" y1="80" x2="1062" y2="710" />
      </g>

      <text class="dense-note" x="715" y="103">Every branch is visible at once; the critical path is hard to isolate.</text>

      <g class="noise">
        <path d="M78 132 C186 110 326 112 447 144" stroke="#8b5cf6" />
        <text x="264" y="118">Address normalize</text>
        <path d="M201 156 C340 120 508 120 693 156" stroke="#667085" />
        <text x="447" y="128">Audit draft snapshot</text>
        <path d="M324 170 C468 140 652 140 816 174" stroke="#d95f5f" />
        <text x="570" y="148">Fraud queue preview</text>
        <path d="M447 196 C620 164 848 164 1062 196" stroke="#16a4c4" />
        <text x="755" y="170">Back-in-stock suppression</text>
        <path d="M570 238 C456 214 312 216 201 242" stroke="#df8f32" />
        <text x="386" y="220">Payment retry token</text>
        <path d="M570 254 C700 226 910 228 1062 260" stroke="#16a4c4" />
        <text x="820" y="232">Payment link fallback</text>
        <path d="M324 288 C462 258 580 258 693 286" stroke="#16a36f" />
        <text x="509" y="262">Tax invoice reserve</text>
        <path d="M693 314 C585 292 442 292 324 316" stroke="#667085" />
        <text x="509" y="296">Ledger consistency check</text>
        <path d="M324 342 C510 318 842 318 1062 342" stroke="#16a4c4" />
        <text x="693" y="322">Email, push, SMS fan-out</text>
        <path d="M201 356 C330 392 665 392 816 356" stroke="#d95f5f" />
        <text x="509" y="384">Warehouse capacity hint</text>
        <path d="M816 416 C684 392 550 392 447 418" stroke="#16a36f" />
        <text x="632" y="396">Reservation expiry reconcile</text>
        <path d="M816 438 C682 462 466 462 324 438" stroke="#667085" />
        <text x="570" y="466">Packing exception webhook</text>
        <path d="M816 472 C880 440 1008 442 1062 476" stroke="#16a4c4" />
        <text x="946" y="444">Picked notice</text>
        <path d="M939 498 C820 528 558 528 324 500" stroke="#d95f5f" />
        <text x="632" y="532">Waybill correction path</text>
        <path d="M693 520 C780 548 910 548 1062 520" stroke="#8b5cf6" />
        <text x="878" y="552">Shipment BI event</text>
        <path d="M939 568 C790 542 510 542 201 568" stroke="#df8f32" />
        <text x="570" y="546">Delivery slot edit</text>
        <path d="M1062 594 C870 624 485 624 78 594" stroke="#16a4c4" />
        <text x="570" y="626">Notification retry and open tracking</text>
        <path d="M939 628 C1000 598 1060 602 1062 632" stroke="#16a4c4" />
        <text x="1008" y="604">ETA push</text>
        <path d="M324 660 C420 636 596 636 693 660" stroke="#16a36f" />
        <text x="509" y="640">Proof hash write</text>
        <path d="M324 690 C520 722 824 722 1062 690" stroke="#8b5cf6" />
        <text x="693" y="725">Review coupon, invoice, after-sales links</text>
      </g>

      <path class="msg" d="M78 152 H201" stroke="var(--blue)" />
      <text class="label" x="139" y="143">Submit cart and address</text>
      <path class="msg" d="M201 184 H324" stroke="var(--blue)" />
      <text class="label" x="263" y="176">Create checkout draft</text>
      <path class="msg" d="M324 210 H447" stroke="var(--green)" />
      <text class="label" x="386" y="201">Reserve stock</text>

      <path class="msg" d="M201 276 H570" stroke="var(--orange)" />
      <text class="label" x="386" y="267">Open payment session</text>
      <path class="msg return" d="M570 308 H324" stroke="var(--orange)" />
      <text class="label" x="447" y="299">Authorized payment callback</text>
      <path class="msg" d="M324 336 H693" stroke="var(--green)" />
      <text class="label" x="509" y="327">Mark order paid</text>
      <path class="msg" d="M324 360 H1062" stroke="var(--blue)" />
      <text class="label" x="693" y="352">Send confirmation</text>

      <path class="msg" d="M324 430 H816" stroke="var(--red)" />
      <text class="label" x="570" y="421">Release pick ticket</text>
      <path class="msg" d="M816 460 H447" stroke="var(--green)" />
      <text class="label" x="632" y="451">Deduct reserved stock</text>
      <path class="msg" d="M816 490 H939" stroke="var(--red)" />
      <text class="label" x="878" y="481">Create waybill</text>
      <path class="msg return" d="M939 514 H324" stroke="var(--red)" />
      <text class="label" x="632" y="505">Return tracking number</text>

      <path class="msg" d="M939 580 H1062" stroke="var(--blue)" />
      <text class="label" x="1001" y="571">Status and ETA updates</text>
      <path class="msg return" d="M1062 612 H78" stroke="var(--blue)" />
      <text class="label" x="570" y="603">Tracking link and reminders</text>
      <path class="msg" d="M939 646 H324" stroke="var(--green)" />
      <text class="label" x="632" y="637">Signed delivery receipt</text>
      <path class="msg" d="M324 674 H693" stroke="var(--green)" />
      <text class="label" x="509" y="665">Save delivery proof</text>
      <path class="msg" d="M324 702 H1062" stroke="var(--blue)" />
      <text class="label" x="693" y="693">Delivery complete notice</text>
    </svg>
  </main>
</body>
</html>

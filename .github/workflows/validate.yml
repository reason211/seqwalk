name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate ExactSeq skill
        run: python3 scripts/validate_skill.py skill/exactseq
